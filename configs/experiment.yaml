# ================= ОБЩИЕ ПАРАМЕТРЫ =================
seed: 42
device: "auto"  # auto / cuda / cpu

# ================= ПОДГОТОВКА ДАТАСЕТА =================
dataset:
  source_root: "data/seg_row"
  dest_root: "data/seg_processed"
  img_extensions: [".jpg", ".jpeg", ".png", ".bmp"]

# ================= ОБУЧЕНИЕ =================
training:
  task: "segment"        # detect | segment
  model: "yolo11n-seg.pt"   # yolo11n-seg.pt для сегментации
  epochs: 100
  batch: 16
  imgsz: 640
  n_folds: 5
  project: "outputs/training"
  augmentation:
    mosaic: 0.5
    mixup: 0.1
    perspective: 0.0    # Для диаграмм перспективу лучше отключить
    shear: 0.0

# ================= ИНФЕРЕНС =================
inference:
  weights: "outputs/training/fold_0_runs/train/weights/best.pt"
  conf: 0.5
  source: "data/test_images"
  output_dir: "outputs/inference"
  save_crop: false

# ================= КОНВЕРТАЦИЯ DET → SEG =================
conversion:
  sam_checkpoint: "sam_vit_h_4b8939.pth"  # Путь к весам SAM
  confidence_threshold: 0.85               # Мин. уверенность маски
  iou_threshold: 0.6                       # Мин. IoU bbox↔mask
  approx_epsilon_ratio: 0.005              # Упрощение полигона

# ================= ГРАНИЦЫ СЕКТОРОВ =================
clustering:
  ring_inner_ratio: 0.35 # Внутренний радиус кольца (относительно R)
  ring_outer_ratio: 0.95 # Внешний радиус кольца
  
  # Прочее
  conf_threshold: 0.5
  imgsz: 640
  smooth_window: 7
  score_window: 5
  threshold_factor: 0.8
  min_boundary_distance_deg: 3
  min_sector_deg: 8
  merge_color_distance: 0.08
  weak_boundary_ratio: 0.0
  radial_bands: 3
  max_candidate_peaks: 0
  optimize_boundaries: true
  optimizer_keep_score: 0.12
